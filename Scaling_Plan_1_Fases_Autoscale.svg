<svg width="100%" viewBox="0 0 680 732" role="img" xmlns="http://www.w3.org/2000/svg">
<title>AVD Scaling Plan — 4 fases do Autoscale com algoritmo de balanceamento por fase</title>
<desc>Ramp-up, Peak, Ramp-down e Off-peak: hosts ligados, usuarios, acao do Autoscale e o algoritmo (Breadth-first no pico, Depth-first nas demais).</desc>
<rect x="0" y="0" width="680" height="732" fill="#FFFFFF"/>

<!-- Header -->
<text x="40" y="32" font-size="19" font-weight="500" fill="#1F2430">Scaling Plan (Autoscale) do AVD — na prática</text>
<text x="40" y="54" font-size="12.5" fill="#5B6470">Simulação: 3 hosts · até 100 usuários · limite 40 sessões/host</text>

<!-- Legend -->
<rect x="40" y="80" width="20" height="13" rx="2" fill="#22A06B"/><rect x="47" y="93" width="6" height="3" fill="#22A06B"/>
<text x="66" y="91" font-size="11.5" fill="#5B6470">ligado</text>
<rect x="118" y="80" width="20" height="13" rx="2" fill="#E8A33D"/><rect x="125" y="93" width="6" height="3" fill="#E8A33D"/>
<text x="144" y="91" font-size="11.5" fill="#5B6470">ligando</text>
<rect x="206" y="80" width="20" height="13" rx="2" fill="#C2C7CE"/><rect x="213" y="93" width="6" height="3" fill="#C2C7CE"/>
<text x="232" y="91" font-size="11.5" fill="#5B6470">desalocado (off)</text>
<text x="360" y="91" font-size="11.5" fill="#5B6470">● ○ ○  =  custo de compute</text>

<!-- Card 1 — Ramp-up (T=106) -->
<rect x="40" y="106" width="600" height="104" rx="12" fill="#F5F7FA" stroke="#D7DCE3"/>
<rect x="52" y="120" width="126" height="76" rx="10" fill="#FBEEDD"/>
<text x="115" y="142" text-anchor="middle" font-size="14" font-weight="500" fill="#92400E">Ramp-up</text>
<text x="115" y="158" text-anchor="middle" font-size="10.5" fill="#B45309">manhã · liga</text>
<rect x="63" y="168" width="104" height="18" rx="9" fill="#6B4FC0"/><text x="115" y="181" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ffffff">Depth-first</text>
<text x="196" y="136" font-size="11" fill="#5B6470">Hosts</text>
<rect x="200" y="146" width="22" height="15" rx="2" fill="#22A06B"/><rect x="207" y="161" width="8" height="3" fill="#22A06B"/>
<rect x="232" y="146" width="22" height="15" rx="2" fill="#E8A33D"/><rect x="239" y="161" width="8" height="3" fill="#E8A33D"/>
<rect x="264" y="146" width="22" height="15" rx="2" fill="#C2C7CE"/><rect x="271" y="161" width="8" height="3" fill="#C2C7CE"/>
<text x="196" y="190" font-size="19" font-weight="500" fill="#1F2430">0 → 35</text>
<text x="196" y="204" font-size="10.5" fill="#5B6470">usuários chegando</text>
<text x="392" y="134" font-size="11.5" fill="#1F2430">Liga 1 host (Min 33%) antes da demanda.</text>
<text x="392" y="152" font-size="11.5" fill="#1F2430">Passa do Capacity threshold → liga o 2º.</text>
<text x="392" y="170" font-size="11.5" fill="#1F2430">Depth concentra p/ ligar o mínimo de VMs.</text>
<circle cx="396" cy="192" r="4" fill="#E8A33D"/><circle cx="410" cy="192" r="4" fill="none" stroke="#98A0AC"/><circle cx="424" cy="192" r="4" fill="none" stroke="#98A0AC"/>
<text x="436" y="196" font-size="11" fill="#5B6470">custo baixo (subindo)</text>

<!-- Card 2 — Peak (T=222) -->
<rect x="40" y="222" width="600" height="104" rx="12" fill="#F5F7FA" stroke="#D7DCE3"/>
<rect x="52" y="236" width="126" height="76" rx="10" fill="#E6F1FB"/>
<text x="115" y="258" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Peak</text>
<text x="115" y="274" text-anchor="middle" font-size="10.5" fill="#2C6CB0">produção · pico</text>
<rect x="63" y="284" width="104" height="18" rx="9" fill="#1E6FBF"/><text x="115" y="297" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ffffff">Breadth-first</text>
<text x="196" y="252" font-size="11" fill="#5B6470">Hosts</text>
<rect x="200" y="262" width="22" height="15" rx="2" fill="#22A06B"/><rect x="207" y="277" width="8" height="3" fill="#22A06B"/>
<rect x="232" y="262" width="22" height="15" rx="2" fill="#22A06B"/><rect x="239" y="277" width="8" height="3" fill="#22A06B"/>
<rect x="264" y="262" width="22" height="15" rx="2" fill="#22A06B"/><rect x="271" y="277" width="8" height="3" fill="#22A06B"/>
<text x="196" y="306" font-size="19" font-weight="500" fill="#1F2430">≈ 100</text>
<text x="196" y="320" font-size="10.5" fill="#5B6470">usuários (≈33/host)</text>
<text x="392" y="250" font-size="11.5" fill="#1F2430">Os 3 hosts disponíveis; só LIGA se precisar.</text>
<text x="392" y="268" font-size="11.5" fill="#1F2430">Nunca desliga durante o pico.</text>
<text x="392" y="286" font-size="11.5" fill="#1F2430">Breadth espalha → melhor performance.</text>
<circle cx="396" cy="308" r="4" fill="#0C447C"/><circle cx="410" cy="308" r="4" fill="#0C447C"/><circle cx="424" cy="308" r="4" fill="#0C447C"/>
<text x="436" y="312" font-size="11" fill="#5B6470">custo alto (capacidade cheia)</text>

<!-- Card 3 — Ramp-down (T=338) -->
<rect x="40" y="338" width="600" height="104" rx="12" fill="#F5F7FA" stroke="#D7DCE3"/>
<rect x="52" y="352" width="126" height="76" rx="10" fill="#FBE3D6"/>
<text x="115" y="374" text-anchor="middle" font-size="13.5" font-weight="500" fill="#9A3412">Ramp-down</text>
<text x="115" y="390" text-anchor="middle" font-size="10.5" fill="#C2410C">fim do dia · esvazia</text>
<rect x="63" y="400" width="104" height="18" rx="9" fill="#6B4FC0"/><text x="115" y="413" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ffffff">Depth-first</text>
<text x="196" y="368" font-size="11" fill="#5B6470">Hosts</text>
<rect x="200" y="378" width="22" height="15" rx="2" fill="#22A06B"/><rect x="207" y="393" width="8" height="3" fill="#22A06B"/>
<rect x="232" y="378" width="22" height="15" rx="2" fill="#C2C7CE"/><rect x="239" y="393" width="8" height="3" fill="#C2C7CE"/>
<rect x="264" y="378" width="22" height="15" rx="2" fill="#C2C7CE"/><rect x="271" y="393" width="8" height="3" fill="#C2C7CE"/>
<text x="196" y="422" font-size="19" font-weight="500" fill="#1F2430">100 → 10</text>
<text x="196" y="436" font-size="10.5" fill="#5B6470">usuários saindo</text>
<text x="392" y="366" font-size="11.5" fill="#1F2430">Depth concentra em menos hosts e</text>
<text x="392" y="384" font-size="11.5" fill="#1F2430">DESALOCA os que esvaziam.</text>
<text x="392" y="402" font-size="11.5" fill="#1F2430">Sessão presa? Força logoff (com aviso).</text>
<circle cx="396" cy="424" r="4" fill="#C2410C"/><circle cx="410" cy="424" r="4" fill="none" stroke="#98A0AC"/><circle cx="424" cy="424" r="4" fill="none" stroke="#98A0AC"/>
<text x="436" y="428" font-size="11" fill="#5B6470">custo caindo</text>

<!-- Card 4 — Off-peak (T=454) -->
<rect x="40" y="454" width="600" height="104" rx="12" fill="#F5F7FA" stroke="#D7DCE3"/>
<rect x="52" y="468" width="126" height="76" rx="10" fill="#E9E8F7"/>
<text x="115" y="490" text-anchor="middle" font-size="14" font-weight="500" fill="#312E81">Off-peak</text>
<text x="115" y="506" text-anchor="middle" font-size="10.5" fill="#4F46A6">noite/madrugada</text>
<rect x="63" y="516" width="104" height="18" rx="9" fill="#6B4FC0"/><text x="115" y="529" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ffffff">Depth-first</text>
<text x="196" y="484" font-size="11" fill="#5B6470">Hosts</text>
<rect x="200" y="494" width="22" height="15" rx="2" fill="#C2C7CE"/><rect x="207" y="509" width="8" height="3" fill="#C2C7CE"/>
<rect x="232" y="494" width="22" height="15" rx="2" fill="#C2C7CE"/><rect x="239" y="509" width="8" height="3" fill="#C2C7CE"/>
<rect x="264" y="494" width="22" height="15" rx="2" fill="#C2C7CE"/><rect x="271" y="509" width="8" height="3" fill="#C2C7CE"/>
<text x="196" y="538" font-size="19" font-weight="500" fill="#1F2430">≈ 0</text>
<text x="196" y="552" font-size="10.5" fill="#5B6470">poucos ou nenhum</text>
<text x="392" y="482" font-size="11.5" fill="#1F2430">Min 0% → tudo desalocado:</text>
<text x="392" y="500" font-size="11.5" fill="#1F2430">paga só disco, ZERO compute.</text>
<text x="392" y="518" font-size="11.5" fill="#1F2430">Conexão tardia? Start VM on connect liga 1.</text>
<circle cx="396" cy="540" r="4" fill="none" stroke="#98A0AC"/><circle cx="410" cy="540" r="4" fill="none" stroke="#98A0AC"/><circle cx="424" cy="540" r="4" fill="none" stroke="#98A0AC"/>
<text x="436" y="544" font-size="11" fill="#5B6470">custo ≈ zero</text>

<!-- Footer -->
<rect x="40" y="574" width="600" height="144" rx="12" fill="#F5F7FA" stroke="#D7DCE3"/>
<text x="56" y="594" font-size="12.5" font-weight="500" fill="#1F2430">Algoritmo de balanceamento por fase</text>
<rect x="56" y="602" width="80" height="17" rx="8" fill="#1E6FBF"/><text x="96" y="614" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ffffff">Breadth-first</text>
<text x="144" y="614" font-size="11.5" fill="#5B6470">espalha sessões → melhor performance · usar no PICO (produção)</text>
<rect x="56" y="626" width="80" height="17" rx="8" fill="#6B4FC0"/><text x="96" y="638" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ffffff">Depth-first</text>
<text x="144" y="638" font-size="11.5" fill="#5B6470">concentra sessões → permite desligar hosts · usar FORA do pico</text>
<text x="56" y="662" font-size="11" fill="#5B6470">Min hosts % = piso ligado na fase   ·   Capacity threshold = gatilho para ligar +1 host</text>
<text x="56" y="680" font-size="11" fill="#5B6470">Force logoff = encerra sessão presa (ramp-down)   ·   Deallocate = desliga + libera compute (paga só disco)</text>
<text x="56" y="702" font-size="11.5" font-weight="500" fill="#15803D">Ligado ~11h/dia útil vs 24h  →  ~65% menos custo de compute · o ciclo se repete todo dia</text>
</svg>
